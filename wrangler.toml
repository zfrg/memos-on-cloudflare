name = "cfmemos"
main = "worker/src/index.ts"
compatibility_date = "2025-05-01"

[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/file/*", "/u/*", "/explore/rss.xml"]

[vars]
INSTANCE_NAME = "cfmemos"
APP_VERSION = "1.0.0"

[[d1_databases]]
binding = "DB"
database_name = "cfmemos-db"
database_id = "efb2f813-c777-494c-941a-cd34bc0e7d5b"

# Choose one of the two storage backends below.
# Option A: R2 (recommended for large files, native range requests)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cfmemos"

# Option B: KV (alternative; 25MB per-file limit, no native range support).
# Comment out the [[r2_buckets]] block above and uncomment this block.
# Requires: wrangler kv namespace create cfmemos-storage
#[[kv_namespaces]]
#binding = "STORAGE_KV"
#id = ""

# Optional KV cache. Create a namespace with:
#   wrangler kv namespace create cfmemos-cache
# Then uncomment this block and replace the id.
[[kv_namespaces]]
binding = "CACHE"
id = "3b729feb97144c19b86bcde13be655e7"

[ai]
binding = "AI"
